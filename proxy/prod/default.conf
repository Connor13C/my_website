# Allow 10 requests/second per IP, using 10MB of shared memory for tracking
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Stricter zone for login endpoints - 1 request/second per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

server_tokens off;

server {
    listen 80 default_server;
    server_name _;
    access_log	/var/log/nginx/access.log;
    error_log	/var/log/nginx/error.log;

    # Include global ssl config
    include /etc/nginx/ssl-config.conf;

    # Include global deny rules
    include /etc/nginx/security-deny.conf;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    ssl_certificate	    /etc/ssl/domain.cert.pem;
    ssl_certificate_key	/etc/ssl/private.key.pem;
    server_name _;
    access_log	/var/log/nginx/access.log;
    error_log	/var/log/nginx/error.log;

    # Include global deny rules
    include /etc/nginx/security-deny.conf;

    # Include global ssl config
    include /etc/nginx/ssl-config.conf;

    return 301 https://www.connorbcarey.dev$request_uri;
}

server {
    listen 443 ssl;
    ssl_certificate	    /etc/ssl/domain.cert.pem;
    ssl_certificate_key	/etc/ssl/private.key.pem;
    server_name www.*;
    access_log	/var/log/nginx/access.log;
    error_log	/var/log/nginx/error.log;

    # Include global ssl config
    include /etc/nginx/ssl-config.conf;

    # Include global deny rules
    include /etc/nginx/security-deny.conf;

    location / {
        proxy_pass          http://app_main:5000/;
        proxy_redirect      off;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_set_header    X-Forwarded-Host $host:443;
        proxy_set_header    X-Forwarded-Port 443;
        proxy_http_version  1.1;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
        proxy_busy_buffers_size 256k;
    }
}

server {
    listen 443 ssl;
    ssl_certificate	    /etc/ssl/domain.cert.pem;
    ssl_certificate_key	/etc/ssl/private.key.pem;
    server_name django.*;
    access_log	/var/log/nginx/app1_access.log;
    error_log	/var/log/nginx/app1_error.log;

    # Include global ssl config
    include /etc/nginx/ssl-config.conf;

    # Include global deny rules
    include /etc/nginx/security-deny.conf;

    location /static/ {
        alias /var/www/app1/static/;
    }

    location / {
        proxy_pass          http://app1:5000/;
        proxy_redirect      off;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
